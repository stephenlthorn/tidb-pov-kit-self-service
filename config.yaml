pre_poc:
  scenario_template: ai_vector
  security:
    items:
    - id: shared_responsibility_ack
      prompt: Has the team reviewed and accepted the shared responsibility model (customer
        vs PingCAP boundaries)?
      status: pass
      blocking: true
      owner: Customer
    - id: data_residency_boundary
      prompt: Can this PoC keep production-like data/backups within approved account
        and region boundaries?
      status: pass
      blocking: true
      owner: Customer
    - id: network_controls
      prompt: Can your team manage VPC, Security Group, and NACL controls needed for
        this deployment?
      status: pass
      blocking: true
      owner: Customer
    - id: private_connectivity
      prompt: Can you enforce private connectivity (Private Endpoint/PrivateLink or
        VPC peering where required) without public routing?
      status: pass
      blocking: true
      owner: Customer
    - id: cmk_control
      prompt: Can your security team manage AWS KMS CMKs and key lifecycle controls
        for data at rest?
      status: pass
      blocking: true
      owner: Customer
    - id: iam_role_hygiene
      prompt: Can elevated provisioning IAM roles be removed/disabled after bootstrap
        (least-privilege runtime only)?
      status: pass
      blocking: true
      owner: Customer
    - id: jit_access
      prompt: Can support access be enforced as customer-controlled Just-in-Time (bastion
        + VPN enablement + scoped role)?
      status: pass
      blocking: true
      owner: Customer
    - id: auditability
      prompt: Can CloudTrail and TiDB audit logs be retained in customer-controlled
        storage/SIEM for auditability?
      status: pass
      blocking: true
      owner: Customer
    - id: supply_chain_scan
      prompt: Will your security team scan images/artifacts before deployment where
        applicable?
      status: pass
      blocking: false
      owner: Customer
    - id: continuity_expectation
      prompt: Is the team aligned that data-plane availability can continue even if
        control-plane automation is temporarily unavailable?
      status: pass
      blocking: false
      owner: Shared
    blocking_failures: []
    non_blocking_failures: []
    recommendation: proceed
    proceed: true
  go_no_go: proceed
